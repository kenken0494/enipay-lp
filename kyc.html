<style>
:root{--bg:#0a0f0d;--panel:#12201a;--ink:#f2f6f3;--muted:#9fb0a6;--green:#3fd06a;--green-d:#2aa354;--line:#20302a}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 70% 20%,rgba(63,208,106,.18),transparent 60%),var(--bg);
  color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",YuGothic,"Noto Sans JP",system-ui,sans-serif;
  display:flex;align-items:center;justify-content:center;padding:28px;line-height:1.7}
.card{max-width:620px;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.card img{width:100%;display:block;border-bottom:1px solid var(--line)}
.body{padding:26px 26px 30px}
.eyebrow{font-size:13px;font-weight:800;letter-spacing:.08em;color:var(--green);text-transform:uppercase;margin-bottom:8px}
h1{font-size:24px;margin:0 0 10px;font-weight:900;letter-spacing:.01em}
p{margin:0 0 18px;color:var(--muted);font-size:15px}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.pill{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:700;color:#cfe6d8}
.btn{display:block;text-align:center;background:var(--green);color:#04180c;font-weight:900;font-size:17px;padding:16px;border-radius:14px;text-decoration:none;transition:transform .08s ease,background .2s}
.btn:hover{background:var(--green-d);transform:translateY(-1px)}
.note{margin-top:16px;font-size:12.5px;color:var(--muted);text-align:center}
a.plain{color:var(--green);text-decoration:none}
</style>
</head>
<body>
  <main class="card">
    <img src="kyc-ogp.png" alt="ENIPAYカード KYC申請マニュアル">
    <div class="body">
      <div class="eyebrow">KYC・本人確認</div>
      <h1>ENIPAYカードのKYC申請（画面つき）</h1>
      <p>本人確認の申請手順を、個人情報・住所・身分証番号・書類アップロードまで、実際の画面つきで順番に解説しています。カードを実際に使うにはこの本人確認が必須です。</p>
      <div class="meta">
        <span class="pill">画面つき全手順</span>
        <span class="pill">審査 5営業日以内</span>
        <span class="pill">PDF形式</span>
      </div>
      <a class="btn" href="enipay-kyc-manual.pdf">KYC申請マニュアルPDFを開く →</a>
      <p class="note">開かない場合はこちら：<a class="plain" href="enipay-kyc-manual.pdf">enipay-kyc-manual.pdf</a></p>
    </div>
  </main>
</body>
</html>
